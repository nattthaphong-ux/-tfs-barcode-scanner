<!DOCTYPE html>
<html>
<head>
  <title>Scan Barcode and Search TFS</title>
  <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      padding: 20px;
    }
    h2 {
      text-align: center;
      font-size: 28px;
    }
    #reader {
      width: 100%;
      height: 300px;
      background-color: black;
      margin-top: 20px;
      border-radius: 14px;
    }
    .result {
      margin-top: 20px;
      padding: 20px;
      background-color: #e1f4e3;
      border-radius: 10px;
    }
    .result h3 {
      font-size: 22px;
    }
  </style>
</head>

<body>
  <h2>Scan Barcode to Search TFS</h2>
  
  <div id="reader"></div>

  <button onclick="stopScanner()">Stop Scanning</button>
  
  <div class="result" id="result"></div>

  <script>
    const html5QrCode = new Html5Qrcode("reader");
    const config = {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      formatsToSupport: [Html5QrcodeSupportedFormats.CODE_128]
    };

    function startScanner() {
      html5QrCode.start(
        { facingMode: "environment" },
        config,
        function(decodedText) {
          handleScanResult(decodedText);
        },
        function(errorMessage) {}
      ).then(() => {
        console.log("Scanner started successfully.");
      }).catch(err => {
        console.log("Error: ", err);
      });
    }

    function stopScanner() {
      html5QrCode.stop().then(() => {
        console.log("Scanner stopped successfully.");
      }).catch(err => {
        console.log("Error stopping scanner: ", err);
      });
    }

    function handleScanResult(decodedText) {
      // Stop scanner when we get a result
      stopScanner();

      // Display the TFS number
      document.getElementById("result").innerHTML = `Scanned TFS: ${decodedText}`;

      // Call Apps Script to process this TFS
      searchTfs(decodedText);
    }

    function searchTfs(tfsNumber) {
      const url = `https://script.google.com/macros/s/AKfycbzkgSEKjUyFnSDVkrarhANwMwmbTW-ABs2baU9CCJQKA4XBMix4PONNx4Oun1waLnm9/exec?tfs=${tfsNumber}`;
      
      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            document.getElementById("result").innerHTML = `
              <h3>Found Results:</h3>
              <p>Order Number: ${data.no}</p>
              <p>TFS: ${data.tfs}</p>
              <p>OCR Text: ${data.ocrText}</p>
            `;
          } else {
            document.getElementById("result").innerHTML = `Error: ${data.message}`;
          }
        })
        .catch(error => {
          console.error('Error:', error);
          document.getElementById("result").innerHTML = `Error: ${error.message}`;
        });
    }

    // Start the scanner
    startScanner();
  </script>
</body>
</html>
